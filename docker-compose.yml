services:
  nova:
    build: .
    ports:
      - "8765:8765"    # NOVA API
      - "8767:8767"    # Avatar WebSocket
      - "9090:9090"    # Prometheus metrics
    environment:
      NOVA_CONFIG: /app/nova.config.json
      NOVA_LLM_URL: http://ollama:11434/v1
      NOVA_LLM_MODEL: qwen2.5:14b
      NOVA_KNOWLEDGE: "true"
      NOVA_EMBEDDING_URL: http://ollama:11434
      NOVA_EMBEDDING_MODEL: nomic-embed-text
      NOVA_VECTOR_BACKEND: qdrant
      NOVA_QDRANT_URL: http://qdrant:6333
    volumes:
      - ./nova.config.json:/app/nova.config.json:ro
      - ./characters:/app/characters:ro
      - ./knowledge:/app/knowledge:ro
      - nova_state:/app/data/state
      - nova_logs:/app/log
    depends_on:
      - ollama
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

volumes:
  ollama_models:
  qdrant_data:
  grafana_data:
  prometheus_data:
  nova_state:
  nova_logs:
