apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova
  labels:
    app: nova
    version: v2.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nova
  template:
    metadata:
      labels:
        app: nova
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8765"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nova
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: nova
          image: nova:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8765
              name: http
              protocol: TCP
            - containerPort: 8767
              name: avatar-ws
              protocol: TCP
          env:
            - name: NOVA_RUNTIME__ROLE
              value: api
            - name: NOVA_RUNTIME__INSTANCE_NAME
              value: nova-api
            - name: NOVA_CONFIG
              value: /app/nova.config.json
            - name: NOVA_LLM__BASE_URL
              value: http://ollama:11434/v1
            - name: NOVA_KNOWLEDGE__ENABLED
              value: "true"
            - name: NOVA_KNOWLEDGE__VECTOR_BACKEND
              value: qdrant
            - name: NOVA_KNOWLEDGE__QDRANT_URL
              value: http://qdrant:6333
            - name: NOVA_PERSIST__ENABLED
              value: "true"
            - name: NOVA_PERSIST__BACKEND
              value: redis
            - name: NOVA_PERSIST__REDIS_URL
              value: redis://redis:6379
            - name: NOVA_PERSIST__POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: postgres-url
            - name: NOVA_PERSIST__PERSIST_CONVERSATIONS
              value: "true"
            - name: NOVA_PERSIST__PERSIST_SAFETY
              value: "true"
            - name: NOVA_AUTH__ENABLED
              value: "true"
            - name: NOVA_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nova-secrets
                  key: jwt-secret
            - name: NOVA_OBSERVABILITY__TRACING_ENABLED
              value: "true"
            - name: NOVA_OBSERVABILITY__TRACING_ENDPOINT
              value: http://otel-collector:4317
          envFrom:
            - secretRef:
                name: nova-secrets
                optional: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /app/nova.config.json
              subPath: nova.config.json
              readOnly: true
            - name: characters
              mountPath: /app/characters
              readOnly: true
            - name: knowledge
              mountPath: /app/knowledge
              readOnly: true
            - name: state
              mountPath: /app/data/state
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: nova-config
        - name: characters
          configMap:
            name: nova-characters
        - name: knowledge
          configMap:
            name: nova-knowledge
        - name: state
          emptyDir: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nova
  labels:
    app: nova
spec:
  type: ClusterIP
  ports:
    - port: 8765
      targetPort: http
      protocol: TCP
      name: http
    - port: 8767
      targetPort: avatar-ws
      protocol: TCP
      name: avatar-ws
  selector:
    app: nova
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-perception
  labels:
    app: nova
    component: perception
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nova
      component: perception
  template:
    metadata:
      labels:
        app: nova
        component: perception
    spec:
      serviceAccountName: nova
      containers:
        - name: nova-perception
          image: nova:latest
          imagePullPolicy: IfNotPresent
          command: ["nova-worker", "perception"]
          env:
            - name: NOVA_RUNTIME__ROLE
              value: perception
            - name: NOVA_RUNTIME__EVENT_BUS_MODE
              value: external_consumer
            - name: NOVA_RUNTIME__EVENT_BUS_BACKEND
              value: redis_streams
            - name: NOVA_CONFIG
              value: /app/nova.config.json
            - name: NOVA_LLM__BASE_URL
              value: http://ollama:11434/v1
            - name: NOVA_KNOWLEDGE__ENABLED
              value: "true"
            - name: NOVA_KNOWLEDGE__VECTOR_BACKEND
              value: qdrant
            - name: NOVA_KNOWLEDGE__QDRANT_URL
              value: http://qdrant:6333
            - name: NOVA_PERSIST__ENABLED
              value: "true"
            - name: NOVA_PERSIST__BACKEND
              value: redis
            - name: NOVA_PERSIST__REDIS_URL
              value: redis://redis:6379
            - name: NOVA_PERSIST__POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: postgres-url
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /app/nova.config.json
              subPath: nova.config.json
              readOnly: true
            - name: characters
              mountPath: /app/characters
              readOnly: true
            - name: knowledge
              mountPath: /app/knowledge
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: nova-config
        - name: characters
          configMap:
            name: nova-characters
        - name: knowledge
          configMap:
            name: nova-knowledge
---
