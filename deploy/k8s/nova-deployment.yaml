apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nova-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nova
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: nova_eventbus_queue_depth
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nova-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nova
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nova-config
  data:
  nova.config.json: |
    {
      "llm": {
        "base_url": "http://ollama:11434/v1",
        "model": "qwen2.5:14b"
      },
      "knowledge": {
        "enabled": true,
        "embedding_backend": "ollama",
        "vector_backend": "qdrant"
      },
      "persistence": {
        "enabled": true,
        "backend": "redis",
        "postgres_url": "postgresql://nova:nova@postgres:5432/nova",
        "persist_conversations": true,
        "persist_safety": true
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: nova-secrets
type: Opaque
stringData:
  jwt-secret: "change-me-in-production-use-a-strong-random-string"
  llm-api-key: "ollama"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nova
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: postgres-db
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d/init_postgres.sql
              subPath: init_postgres.sql
      volumes:
        - name: postgres-init
          configMap:
            name: nova-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
type: Opaque
stringData:
  postgres-user: nova
  postgres-password: nova
  postgres-db: nova
  postgres-url: postgresql://nova:nova@postgres:5432/nova
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nova-postgres-init
data:
  init_postgres.sql: |
    create schema if not exists public;
    create table if not exists public.conversation_turns (
      id text primary key,
      runtime_instance text not null,
      session_id text not null,
      event_type text not null,
      source text not null,
      trace_id text,
      ts timestamptz not null,
      role text not null,
      viewer_id text,
      viewer_name text,
      text_content text,
      payload_json jsonb not null default '{}'::jsonb
    );
    create index if not exists idx_conversation_turns_ts on public.conversation_turns (ts desc);
    create index if not exists idx_conversation_turns_trace on public.conversation_turns (trace_id);
    create table if not exists public.safety_events (
      id text primary key,
      runtime_instance text not null,
      session_id text not null,
      trace_id text,
      ts timestamptz not null,
      category text not null,
      reason text,
      blocked_text text,
      payload_json jsonb not null default '{}'::jsonb
    );
    create index if not exists idx_safety_events_ts on public.safety_events (ts desc);
    create index if not exists idx_safety_events_trace on public.safety_events (trace_id);
    create table if not exists public.runtime_sessions (
      id text primary key,
      runtime_instance text not null,
      status text not null,
      role text not null,
      character text,
      llm_model text,
      started_at timestamptz not null,
      stopped_at timestamptz,
      last_activity_at timestamptz,
      summary_json jsonb not null default '{}'::jsonb
    );
    create table if not exists public.runtime_viewers (
      id text primary key,
      runtime_instance text not null,
      session_id text not null,
      platform text,
      username text,
      is_member boolean not null default false,
      gift_total double precision not null default 0,
      interaction_count integer not null default 0,
      last_seen_at timestamptz,
      last_event_type text,
      last_message text,
      payload_json jsonb not null default '{}'::jsonb
    );
    create table if not exists public.audit_logs (
      id text primary key,
      runtime_instance text not null,
      ts timestamptz not null,
      action text not null,
      resource_type text not null,
      resource_id text,
      detail_json jsonb not null default '{}'::jsonb
    );
    create table if not exists public.tenants (
      id text primary key,
      name text not null,
      slug text not null unique,
      status text not null default 'active',
      plan text not null default 'enterprise',
      created_at timestamptz not null default now(),
      updated_at timestamptz not null default now()
    );
    create table if not exists public.roles (
      id text primary key,
      tenant_id text not null,
      name text not null,
      scope text not null,
      description text,
      created_at timestamptz not null default now(),
      updated_at timestamptz not null default now()
    );
    create table if not exists public.config_revisions (
      id text primary key,
      tenant_id text not null,
      resource_type text not null,
      resource_id text not null,
      revision_no integer not null,
      status text not null default 'draft',
      config_json jsonb not null default '{}'::jsonb,
      created_at timestamptz not null default now()
    );
    create table if not exists public.permissions (
      id text primary key,
      code text not null unique,
      resource text not null,
      action text not null,
      description text,
      created_at timestamptz not null default now()
    );
    create table if not exists public.role_permissions (
      role_id text not null,
      permission_id text not null,
      created_at timestamptz not null default now(),
      primary key (role_id, permission_id)
    );
    create table if not exists public.users (
      id text primary key,
      tenant_id text not null,
      email text not null,
      display_name text,
      status text not null default 'active',
      created_at timestamptz not null default now(),
      updated_at timestamptz not null default now()
    );
    create table if not exists public.user_roles (
      user_id text not null,
      role_id text not null,
      created_at timestamptz not null default now(),
      primary key (user_id, role_id)
    );
    create index if not exists idx_runtime_sessions_started_at on public.runtime_sessions (started_at desc);
    create index if not exists idx_runtime_viewers_session_id on public.runtime_viewers (session_id);
    create index if not exists idx_audit_logs_ts on public.audit_logs (ts desc);
    create index if not exists idx_roles_tenant_id on public.roles (tenant_id);
    create index if not exists idx_config_revisions_resource on public.config_revisions (resource_type, resource_id, revision_no desc);
    create index if not exists idx_permissions_code on public.permissions (code);
    create index if not exists idx_users_tenant_id on public.users (tenant_id);
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nova-postgres-migrate
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: postgres:16-alpine
          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: postgres-user
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: postgres-password
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: postgres-db
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h postgres -U "$PGUSER" -d "$PGDATABASE"; do sleep 2; done
              psql -h postgres -U "$PGUSER" -d "$PGDATABASE" -f /sql/init_postgres.sql
          volumeMounts:
            - name: postgres-init
              mountPath: /sql/init_postgres.sql
              subPath: init_postgres.sql
      volumes:
        - name: postgres-init
          configMap:
            name: nova-postgres-init
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              env:
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secrets
                      key: postgres-user
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secrets
                      key: postgres-password
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secrets
                      key: postgres-db
              command:
                - /bin/sh
                - -c
                - |
                  pg_dump -h postgres -U "$PGUSER" "$PGDATABASE" > /backup/nova-$(date +%Y%m%d%H%M%S).sql
              volumeMounts:
                - name: backup-data
                  mountPath: /backup
          volumes:
            - name: backup-data
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
